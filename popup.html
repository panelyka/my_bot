<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Bot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 Game Bot v22.0</h1>
      <p>Автобот для браузерной игры</p>
    </div>

    <div class="section">
      <h2>📊 Статистика</h2>
      <div id="stats-display">
        <div class="stat">Загрузка...</div>
      </div>
      <button class="btn btn-danger" id="reset-stats" style="width: 100%; margin-top: 8px;">Сбросить убийства и дроп</button>
      <button class="btn btn-danger" id="reset-all-stats" style="width: 100%; margin-top: 6px;">Полный сброс статистики</button>
    </div>

    <div class="section">
      <h2>📦 Последние предметы</h2>
      <div id="items-display" style="max-height: 150px; overflow-y: auto;">
        <div class="stat">—</div>
      </div>
    </div>

    <div class="section">
      <h2>👾 Последние мобы</h2>
      <div id="enemies-display" style="max-height: 150px; overflow-y: auto;">
        <div class="stat">—</div>
      </div>
    </div>

    <div class="section">
      <h2>📋 Логи</h2>
      <button class="btn btn-primary" id="view-logs" style="width: 100%; margin-bottom: 5px;">Просмотр в консоли</button>
      <button class="btn btn-primary" id="download-logs" style="width: 100%;">Скачать логи</button>
      <button class="btn btn-danger" id="clear-logs" style="width: 100%; margin-top: 5px;">Очистить логи</button>
    </div>
  </div>

  <div id="drops-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="drops-modal-backdrop"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="drops-modal-title">
      <div class="modal-header">
        <h2 id="drops-modal-title">🧾 Последние выпадения</h2>
        <button class="icon-btn" id="close-drops-modal" aria-label="Закрыть">✕</button>
      </div>
      <div id="drops-history" class="modal-content">
        <div class="stat">Загрузка...</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
